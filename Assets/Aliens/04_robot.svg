<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Antennas -->
  <line x1="75" y1="50" x2="65" y2="25" stroke="#1a1a1a" stroke-width="6" stroke-linecap="round"/>
  <line x1="125" y1="50" x2="135" y2="25" stroke="#1a1a1a" stroke-width="6" stroke-linecap="round"/>
  <circle cx="65" cy="22" r="7" fill="#FF6B6B" stroke="#1a1a1a" stroke-width="5"/>
  <circle cx="135" cy="22" r="7" fill="#FF6B6B" stroke="#1a1a1a" stroke-width="5"/>
  <!-- Body/torso -->
  <rect x="70" y="115" width="60" height="60" rx="8" fill="#5DADE2" stroke="#1a1a1a" stroke-width="6"/>
  <!-- Belly panel -->
  <rect x="85" y="130" width="30" height="30" rx="4" fill="#FFD93D" stroke="#1a1a1a" stroke-width="4"/>
  <circle cx="95" cy="142" r="3" fill="#1a1a1a"/>
  <circle cx="105" cy="142" r="3" fill="#1a1a1a"/>
  <circle cx="95" cy="152" r="3" fill="#1a1a1a"/>
  <circle cx="105" cy="152" r="3" fill="#1a1a1a"/>
  <!-- Arms -->
  <rect x="45" y="125" width="25" height="14" rx="4" fill="#5DADE2" stroke="#1a1a1a" stroke-width="5"/>
  <rect x="130" y="125" width="25" height="14" rx="4" fill="#5DADE2" stroke="#1a1a1a" stroke-width="5"/>
  <!-- Head - square -->
  <rect x="55" y="55" width="90" height="65" rx="10" fill="#5DADE2" stroke="#1a1a1a" stroke-width="6"/>
  <!-- Visor / eye band -->
  <rect x="65" y="75" width="70" height="22" rx="4" fill="#1a1a1a"/>
  <!-- Glowing eyes -->
  <circle cx="82" cy="86" r="6" fill="#7BC96F"/>
  <circle cx="118" cy="86" r="6" fill="#7BC96F"/>
  <!-- Mouth grille -->
  <rect x="80" y="105" width="40" height="8" rx="2" fill="#1a1a1a"/>
  <line x1="90" y1="105" x2="90" y2="113" stroke="#5DADE2" stroke-width="2"/>
  <line x1="100" y1="105" x2="100" y2="113" stroke="#5DADE2" stroke-width="2"/>
  <line x1="110" y1="105" x2="110" y2="113" stroke="#5DADE2" stroke-width="2"/>
</svg>
