<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Ricochet Level Editor</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #c9d1d9;
    --dim: #8b949e; --accent: #58a6ff; --ric: #4dd0e1; --abs: #e040fb;
    --good: #56d364; --bad: #f85149; --warn: #e3b341;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
         display: flex; gap: 14px; padding: 14px; }
  #left { flex: 0 0 auto; }
  #boardWrap { position: relative; }
  canvas { display: block; background: #04070c; border: 1px solid var(--border); border-radius: 6px; }
  #strip { margin-top: 8px; }
  #stats { margin-top: 6px; min-height: 38px; white-space: pre; color: var(--dim); }
  #stats .v { color: var(--text); }
  #stats .ok { color: var(--good); } #stats .fail { color: var(--bad); }
  #right { flex: 1 1 auto; max-width: 460px; display: flex; flex-direction: column; gap: 12px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
  .card h3 { margin: 0 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--dim); }
  button, select {
    background: #21262d; color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 10px; font: inherit; cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button.active { background: var(--accent); color: #04070c; border-color: var(--accent); }
  .row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 6px; }
  .row:last-child { margin-bottom: 0; }
  label { color: var(--dim); }
  input[type=number] {
    width: 64px; background: #0d1117; color: var(--text);
    border: 1px solid var(--border); border-radius: 4px; padding: 3px 6px; font: inherit;
  }
  input[type=range] { width: 130px; }
  textarea {
    width: 100%; height: 190px; background: #0d1117; color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 8px; font: inherit; resize: vertical;
  }
  #obsList { max-height: 170px; overflow-y: auto; }
  .obsRow { padding: 3px 6px; border-radius: 4px; cursor: pointer; display: flex; justify-content: space-between; }
  .obsRow:hover { background: #21262d; }
  .obsRow.sel { background: #1f3a5f; }
  .tag { font-size: 11px; color: var(--dim); }
  kbd { background: #21262d; border: 1px solid var(--border); border-radius: 3px; padding: 0 4px; font-size: 11px; }
  .hint { color: var(--dim); font-size: 11px; }
</style>
</head>
<body>

<div id="left">
  <div id="boardWrap">
    <canvas id="board" width="600" height="720"></canvas>
  </div>
  <canvas id="strip" width="600" height="26"></canvas>
  <div id="stats">—</div>
</div>

<div id="right">
  <div class="card">
    <h3>Level</h3>
    <div class="row">
      <select id="levelSelect"></select>
      <button id="loadBtn">Load</button>
      <label>slot #</label><input id="slotNum" type="number" min="1" max="50" value="1">
      <span class="tag" id="bandTag"></span>
    </div>
    <div class="row">
      <button id="suggestBtn">🎲 Suggest board</button>
      <span class="hint">drops a band-appropriate starter template to refine</span>
    </div>
    <div class="row">
      <label>target x</label>
      <input id="targetX" type="range" min="20" max="180" step="1" value="100">
      <span id="targetXVal" class="v">100</span>
      <button id="clearBtn">Clear board</button>
    </div>
  </div>

  <div class="card">
    <h3>Tools</h3>
    <div class="row">
      <button id="toolSelect" class="active">Select</button>
      <button id="toolLine">+ Line</button>
      <button id="toolLava">+ Lava line</button>
      <button id="toolBox">+ Box</button>
      <button id="toolRing">+ Ring</button>
      <button id="toolShields">+ Shields</button>
      <button id="toolAim">🎯 Aim</button>
    </div>
    <div class="hint">Line/Lava/Box: drag on board. Ring: click center, drag rim handle to resize. Aim: move mouse to aim, click to lock. <kbd>esc</kbd> select · <kbd>⌫</kbd> delete · arrows nudge · <kbd>z</kbd> undo</div>
  </div>

  <div class="card">
    <h3>Selected</h3>
    <div id="params"><span class="hint">Nothing selected.</span></div>
  </div>

  <div class="card">
    <h3>Obstacles</h3>
    <div id="obsList"></div>
  </div>

  <div class="card">
    <h3>Swift export</h3>
    <div class="row">
      <button id="copyBtn">Copy</button>
      <span class="hint" id="copyMsg"></span>
    </div>
    <textarea id="exportBox" readonly></textarea>
  </div>
</div>

// ───────────────────────────────────────────────────────────────
// Geometry: flatten recipes to segments [x1,y1,x2,y2,abs]
// ───────────────────────────────────────────────────────────────
function ringSegs(r) {
  const segs = [];
  const start = r.gapA + r.gapS / 2, end = r.gapA + 2 * Math.PI - r.gapS / 2;
  const step = (end - start) / r.segs;
  for (let i = 0; i < r.segs; i++) {
    const a1 = start + step * i, a2 = start + step * (i + 1);
    segs.push([r.cx + r.r * Math.cos(a1), r.cy + r.r * Math.sin(a1),
               r.cx + r.r * Math.cos(a2), r.cy + r.r * Math.sin(a2), r.abs ? 1 : 0]);
  }
  return segs;
}
function flatten(recipes) {
  const out = [];
  for (const rec of recipes) {
    if (rec.kind === "line") out.push([rec.x1, rec.y1, rec.x2, rec.y2, rec.abs ? 1 : 0]);
    else if (rec.kind === "box") {
      const a = rec.abs ? 1 : 0;
      const lo = Math.min(rec.x1, rec.x2), hi = Math.max(rec.x1, rec.x2);
      const bo = Math.min(rec.y1, rec.y2), to = Math.max(rec.y1, rec.y2);
      out.push([lo, bo, hi, bo, a], [hi, bo, hi, to, a], [hi, to, lo, to, a], [lo, to, lo, bo, a]);
    }
    else if (rec.kind === "ring") out.push(...ringSegs(rec));
    else if (rec.kind === "shields") out.push([5, rec.y1, 5, rec.y2, 1], [195, rec.y1, 195, rec.y2, 1]);
  }
  return out;
}

// ───────────────────────────────────────────────────────────────
// Physics — direct port of LevelSimulator.castRay
// ───────────────────────────────────────────────────────────────
function raySeg(ox, oy, dx, dy, x1, y1, x2, y2) {
  const sx = x2 - x1, sy = y2 - y1;
  const denom = dx * sy - dy * sx;
  if (Math.abs(denom) < 1e-10) return null;
  const t = ((x1 - ox) * sy - (y1 - oy) * sx) / denom;
  const s = ((x1 - ox) * dy - (y1 - oy) * dx) / denom;
  return (t > 0 && s >= 0 && s <= 1) ? t : null;
}
function rayCircle(ox, oy, dx, dy, cx, cy, r) {
  const fx = ox - cx, fy = oy - cy;
  const a = dx * dx + dy * dy, b = 2 * (fx * dx + fy * dy), c = fx * fx + fy * fy - r * r;
  const disc = b * b - 4 * a * c;
  if (disc < 0) return null;
  const sq = Math.sqrt(disc);
  const t1 = (-b - sq) / (2 * a), t2 = (-b + sq) / (2 * a);
  if (t1 > 0.1) return t1;
  if (t2 > 0.1) return t2;
  return null;
}
function castRay(angle, segs, tx) {
  const dx0 = -Math.sin(angle), dy0 = Math.cos(angle);
  let px = SHIP.x + dx0 * SPAWN_DIST, py = SHIP.y + dy0 * SPAWN_DIST;
  let dx = dx0, dy = dy0;
  const path = [[px, py]];
  // side walls bounce; top/bottom void; obstacles per type
  const walls = [
    [0, 0, 0, SCENE_H, 1], [SCENE_W, 0, SCENE_W, SCENE_H, 1],
    [0, SCENE_H, SCENE_W, SCENE_H, 0], [0, 0, SCENE_W, 0, 0],
    ...segs.map(s => [s[0], s[1], s[2], s[3], s[4] ? 0 : 1]),
  ];
  for (let bounce = 0; bounce <= MAX_BOUNCES; bounce++) {
    const tHit = rayCircle(px, py, dx, dy, tx, TARGET_Y, TARGET_R);
    let closest = Infinity, wi = -1;
    for (let i = 0; i < walls.length; i++) {
      const w = walls[i];
      const t = raySeg(px, py, dx, dy, w[0], w[1], w[2], w[3]);
      if (t !== null && t > 0.1 && t < closest) { closest = t; wi = i; }
    }
    if (tHit !== null && tHit > 0.1 && tHit < closest) {
      path.push([px + dx * tHit, py + dy * tHit]);
      return { hit: true, bounces: bounce, path };
    }
    if (wi < 0) return { hit: false, bounces: bounce, path };
    const w = walls[wi];
    if (!w[4]) { path.push([px + dx * closest, py + dy * closest]); return { hit: false, bounces: bounce, path }; }
    px += dx * closest; py += dy * closest;
    const wdx = w[2] - w[0], wdy = w[3] - w[1], len = Math.hypot(wdx, wdy);
    const nx = -wdy / len, ny = wdx / len;
    const dot = dx * nx + dy * ny;
    dx -= 2 * dot * nx; dy -= 2 * dot * ny;
    path.push([px, py]);
  }

// ───────────────────────────────────────────────────────────────
// Solution map sweep (0.1° steps, ±160°) + verdict
// ───────────────────────────────────────────────────────────────
function bandMin(n) {

}
function computeSolution() {
  const segs = flatten(state.recipes);
  const stepDeg = 0.1, lo = -160, hi = 160;
  const count = Math.round((hi - lo) / stepDeg);
  const samples = new Int8Array(count + 1).fill(-1);
  let best = null, bestLen = Infinity;
  for (let i = 0; i <= count; i++) {
    const deg = lo + i * stepDeg;
    const r = castRay(deg * Math.PI / 180, segs, state.tx);
    if (r.hit) {
      samples[i] = Math.min(r.bounces, 99);
      let len = 0;
      for (let k = 1; k < r.path.length; k++)
        len += Math.hypot(r.path[k][0] - r.path[k-1][0], r.path[k][1] - r.path[k-1][1]);
      if (!best || r.bounces < best.bounces || (r.bounces === best.bounces && len < bestLen)) {
        best = r; bestLen = len;

    }
  }
  // windows
  const windows = [];
  let runStart = -1, runMin = 99;
  for (let i = 0; i <= count + 1; i++) {
    const v = i <= count ? samples[i] : -1;
    if (v >= 0) { if (runStart < 0) runStart = i; runMin = Math.min(runMin, v); }
    else if (runStart >= 0) {
      windows.push({ a: lo + runStart * stepDeg, b: lo + (i - 1) * stepDeg, minB: runMin });
      runStart = -1; runMin = 99;
    }
  }
  const total = windows.reduce((s, w) => s + (w.b - w.a), 0);
  const direct = windows.filter(w => w.minB === 0).reduce((s, w) => s + (w.b - w.a), 0);
  const aimable = windows.filter(w => w.b - w.a >= 0.15);
  const effMinB = aimable.length ? Math.min(...aimable.map(w => w.minB))
                : windows.length ? Math.min(...windows.map(w => w.minB)) : -1;
  solMap = { samples, stepDeg, lo, windows, total, direct, effMinB, bestLen };
  bestPath = best ? best.path : null;
  drawStrip(); drawStats(best);
}
function scheduleSim() {
  clearTimeout(simTimer);

}

function drawBoard() {

  bctx.strokeStyle = "#10161f"; bctx.lineWidth = 1;
  for (let g = 10; g < SCENE_W; g += 10) { bctx.beginPath(); bctx.moveTo(X(g), 0); bctx.lineTo(X(g), board.height); bctx.stroke(); }
  for (let g = 10; g < SCENE_H; g += 10) { bctx.beginPath(); bctx.moveTo(0, Y(g)); bctx.lineTo(board.width, Y(g)); bctx.stroke(); }

  bctx.beginPath(); bctx.moveTo(1, 0); bctx.lineTo(1, board.height); bctx.stroke();
  bctx.beginPath(); bctx.moveTo(board.width - 1, 0); bctx.lineTo(board.width - 1, board.height); bctx.stroke();
  bctx.strokeStyle = "rgba(248,81,73,.5)"; bctx.setLineDash([8, 6]);

  bctx.beginPath(); bctx.moveTo(0, board.height - 1); bctx.lineTo(board.width, board.height - 1); bctx.stroke();
  bctx.setLineDash([]);

  bctx.fillStyle = "rgba(86,211,100,.12)"; bctx.fill();
  bctx.strokeStyle = "rgba(86,211,100,.6)"; bctx.lineWidth = 1.5; bctx.stroke();
  bctx.font = "30px serif"; bctx.textAlign = "center"; bctx.textBaseline = "middle";
  bctx.fillText("👾", X(state.tx), Y(TARGET_Y));

  bctx.beginPath();
  bctx.moveTo(X(SHIP.x), Y(SHIP.y + 8));
  bctx.lineTo(X(SHIP.x - 6), Y(SHIP.y - 7));
  bctx.lineTo(X(SHIP.x + 6), Y(SHIP.y - 7));
  bctx.closePath(); bctx.fill();

  state.recipes.forEach((rec, i) => {
    const segs = flatten([rec]);
    const isSel = i === selected;
    for (const s of segs) {
      bctx.strokeStyle = s[4] ? "var-abs" : "var-ric";
      bctx.strokeStyle = s[4] ? (isSel ? "#ff79ff" : "#e040fb") : (isSel ? "#9ff3ff" : "#4dd0e1");

const BOUNCE_COLORS = ["#f85149","#e3b341","#56d364","#4dd0e1","#58a6ff","#bc8cff","#ff7b72","#ffa657","#7ee787","#79c0ff"];

    const v = solMap.samples[i];
    if (v < 0) continue;

    sctx.fillRect(x0, 2, Math.max(1, strip.width / n), strip.height - 4);

  else if (m.effMinB < want)        { verdict = `✗ LOW — minB ${m.effMinB}, band needs ${want}`; cls = "fail"; }
  else if (m.total < 0.15)          { verdict = `✗ BRUTAL — ${m.total.toFixed(2)}° total`; cls = "fail"; }

    `windows <span class="v">${m.windows.length}</span>` +
    `  total <span class="v">${m.total.toFixed(1)}°</span>` +
    `  direct <span class="v">${m.direct.toFixed(1)}°</span>` +
    `  minB <span class="v">${m.effMinB < 0 ? "-" : m.effMinB}</span>` +
    `  best ${best ? `<span class="v">${best.bounces}b ${len}pt</span>${lenWarn}` : "-"}\n` +
    `<span class="${cls}">${verdict}</span>   (slot ${slot}, band needs ${want}+ bounces)`;

function boxLines(r) {

}
function renderExport() {
  const lines = [];

    if (r.kind === "line") {
      const t = r.abs ? ", .absorb" : "";
      lines.push(`line(${fmt(r.x1)}, ${fmt(r.y1)}, ${fmt(r.x2)}, ${fmt(r.y2)}${t}),`);
    } else if (r.kind === "box") {

    }

  const shields = state.recipes.filter(r => r.kind === "shields");

  } else {
    const parts = [];
    for (const r of rings)
      parts.push(`ring(cx: ${fmt(r.cx)}, cy: ${fmt(r.cy)}, r: ${fmt(r.r)}, gapAngle: ${(r.gapA).toFixed(3)}, gapSize: ${(r.gapS).toFixed(3)}, segs: ${r.segs}${r.abs ? ", .absorb" : ""})`);
    for (const r of shields)
      parts.push(`sideShields(${fmt(r.y1)}, ${fmt(r.y2)})`);
    const plainItems = [];
    for (const r of state.recipes) {
      if (r.kind === "line") plainItems.push(`line(${fmt(r.x1)}, ${fmt(r.y1)}, ${fmt(r.x2)}, ${fmt(r.y2)}${r.abs ? ", .absorb" : ""})`);
      else if (r.kind === "box") plainItems.push(...boxLines(r).map(l => l.replace(/,$/, "")));
    }

// ───────────────────────────────────────────────────────────────
// Mouse interaction
// ───────────────────────────────────────────────────────────────
function toGame(e) {
  const rect = board.getBoundingClientRect();
  return { x: (e.clientX - rect.left) / SCALE, y: SCENE_H - (e.clientY - rect.top) / SCALE };
}
function distToSeg(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1, len2 = dx * dx + dy * dy;

  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));

  for (let i = state.recipes.length - 1; i >= 0; i--) {
    for (const s of flatten([state.recipes[i]]))
      if (distToSeg(p.x, p.y, s[0], s[1], s[2], s[3]) < 4) return i;
  }

let drag = null; // {mode:'new'|'p1'|'p2'|'move'|'ringMove', start, orig}
board.addEventListener("mousedown", e => {
  const p = toGame(e);
  if (tool === "aim") { aimLocked = !aimLocked; return; }
  if (tool === "line" || tool === "lava") {
    pushUndo();
    state.recipes.push({ kind: "line", x1: snap(p.x), y1: snap(p.y), x2: snap(p.x), y2: snap(p.y), abs: tool === "lava" });
    selected = state.recipes.length - 1;
    drag = { mode: "p2" };
    refresh(false);
    return;
  }
  if (tool === "box") {
    pushUndo();
    state.recipes.push({ kind: "box", x1: snap(p.x), y1: snap(p.y), x2: snap(p.x), y2: snap(p.y), abs: false });
    selected = state.recipes.length - 1;
    drag = { mode: "p2" };
    refresh(false);
    return;
  }
  if (tool === "ring") {
    pushUndo();
    state.recipes.push({ kind: "ring", cx: snap(p.x), cy: snap(p.y), r: 40, gapA: -Math.PI / 2, gapS: Math.PI / 3, segs: 16, abs: false });
    selected = state.recipes.length - 1;
    setTool("select");
    refresh();
    return;
  }
  // select tool
  if (selected >= 0) {
    const r = state.recipes[selected];
    if (r.kind === "line" || r.kind === "box") {
      if (Math.hypot(p.x - r.x1, p.y - r.y1) < 5) { pushUndo(); drag = { mode: "p1" }; return; }
      if (Math.hypot(p.x - r.x2, p.y - r.y2) < 5) { pushUndo(); drag = { mode: "p2" }; return; }
    }
    if (r.kind === "ring") {
      const ha = r.gapA + Math.PI;
      const rx = r.cx + r.r * Math.cos(ha), ry = r.cy + r.r * Math.sin(ha);
      if (Math.hypot(p.x - rx, p.y - ry) < 7) { pushUndo(); drag = { mode: "ringRadius" }; return; }
      if (Math.hypot(p.x - r.cx, p.y - r.cy) < 6) { pushUndo(); drag = { mode: "ringMove" }; return; }
    }
  }
  const hit = hitTest(p);
  selected = hit;
  if (hit >= 0) { pushUndo(); drag = { mode: "move", last: p }; }
  refresh(false);
});
board.addEventListener("mousemove", e => {
  const p = toGame(e);
  if (tool === "aim" && !aimLocked) {
    let a = Math.atan2(-(p.x - SHIP.x), p.y - SHIP.y);
    a = Math.max(-AIM_LIMIT, Math.min(AIM_LIMIT, a));
    aimAngle = a;
    drawBoard(); drawStrip();
    return;
  }
  if (!drag || selected < 0) return;
  const r = state.recipes[selected];
  if (drag.mode === "p1") { r.x1 = snap(p.x); r.y1 = snap(p.y); }
  else if (drag.mode === "p2") { r.x2 = snap(p.x); r.y2 = snap(p.y); }
  else if (drag.mode === "ringMove") { r.cx = snap(p.x); r.cy = snap(p.y); }
  else if (drag.mode === "ringRadius") { r.r = Math.max(5, snap(Math.hypot(p.x - r.cx, p.y - r.cy))); }
  else if (drag.mode === "move") {
    const dx = p.x - drag.last.x, dy = p.y - drag.last.y;
    drag.last = p;
    if (r.kind === "line" || r.kind === "box") { r.x1 += dx; r.y1 += dy; r.x2 += dx; r.y2 += dy; }
    else if (r.kind === "ring") { r.cx += dx; r.cy += dy; }
    else if (r.kind === "shields") { r.y1 += dy; r.y2 += dy; }
  }
  drawBoard(); scheduleSim();
});
window.addEventListener("mouseup", () => {
  if (drag && selected >= 0) {
    const r = state.recipes[selected];
    if (r.kind === "line" || r.kind === "box") { r.x1 = snap(r.x1); r.y1 = snap(r.y1); r.x2 = snap(r.x2); r.y2 = snap(r.y2); }
    if (tool === "line" || tool === "lava" || tool === "box") setTool("select");
    refresh();
  }
  drag = null;
});
function snap(v) { return Math.round(v); }

// ───────────────────────────────────────────────────────────────
// Tools / keyboard / undo
// ───────────────────────────────────────────────────────────────
const toolButtons = { select: "toolSelect", line: "toolLine", lava: "toolLava", box: "toolBox", ring: "toolRing", shields: "toolShields", aim: "toolAim" };
function setTool(t) {
  if (t === "shields") {
    pushUndo();
    state.recipes.push({ kind: "shields", y1: 170, y2: 225, abs: true });
    selected = state.recipes.length - 1;
    refresh();
    return;
  }
  tool = t;
  if (t !== "aim") { aimAngle = null; aimLocked = false; }
  for (const [k, id] of Object.entries(toolButtons))
    document.getElementById(id).classList.toggle("active", k === tool);
  drawBoard();
}
for (const [k, id] of Object.entries(toolButtons))
  document.getElementById(id).addEventListener("click", () => setTool(k));

function pushUndo() {
  undoStack.push(JSON.stringify(state));
  if (undoStack.length > 80) undoStack.shift();
}
function undo() {
  if (!undoStack.length) return;
  state = JSON.parse(undoStack.pop());
  selected = -1;
  refresh();
}
function deleteSelected() {
  if (selected < 0) return;
  pushUndo();
  state.recipes.splice(selected, 1);
  selected = -1;
  refresh();
}
window.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if (e.key === "Escape") setTool("select");
  else if (e.key === "Backspace" || e.key === "Delete") { deleteSelected(); e.preventDefault(); }
  else if (e.key === "z") undo();
  else if (selected >= 0 && e.key.startsWith("Arrow")) {
    pushUndo();
    const d = e.shiftKey ? 5 : 1;
    const dx = e.key === "ArrowLeft" ? -d : e.key === "ArrowRight" ? d : 0;
    const dy = e.key === "ArrowDown" ? -d : e.key === "ArrowUp" ? d : 0;
    const r = state.recipes[selected];
    if (r.kind === "line" || r.kind === "box") { r.x1 += dx; r.y1 += dy; r.x2 += dx; r.y2 += dy; }
    else if (r.kind === "ring") { r.cx += dx; r.cy += dy; }
    else { r.y1 += dy; r.y2 += dy; }
    refresh(false);
    e.preventDefault();
  }
});

// ───────────────────────────────────────────────────────────────
// Level load / slot / target / persistence
// ───────────────────────────────────────────────────────────────
const sel = document.getElementById("levelSelect");
LEVELS.forEach(l => {
  const o = document.createElement("option");
  o.value = l.n; o.textContent = `Level ${l.n}`;
  sel.appendChild(o);
});
document.getElementById("loadBtn").addEventListener("click", () => {
  pushUndo();
  const l = LEVELS[parseInt(sel.value) - 1];
  state.slot = l.n;
  state.tx = l.tx;
  state.recipes = l.obs.map(o => ({ kind: "line", x1: o[0], y1: o[1], x2: o[2], y2: o[3], abs: !!o[4] }));
  document.getElementById("slotNum").value = l.n;
  document.getElementById("targetX").value = l.tx;
  selected = -1;
  refresh();
});
document.getElementById("clearBtn").addEventListener("click", () => {
  pushUndo(); state.recipes = []; selected = -1; refresh();
});
document.getElementById("slotNum").addEventListener("input", e => {
  state.slot = Math.max(1, Math.min(50, parseInt(e.target.value) || 1));
  refresh(false);
});
document.getElementById("targetX").addEventListener("input", e => {
  state.tx = parseFloat(e.target.value);
  document.getElementById("targetXVal").textContent = state.tx;
  drawBoard(); scheduleSim(); renderExport();
});
document.getElementById("copyBtn").addEventListener("click", () => {
  navigator.clipboard.writeText(document.getElementById("exportBox").value);
  document.getElementById("copyMsg").textContent = "copied ✓";
  setTimeout(() => document.getElementById("copyMsg").textContent = "", 1500);
});

// ───────────────────────────────────────────────────────────────
// Suggest — drops a hand-authored starter template for the current
// band, with mild parameter jitter. Not auto-generation: a scaffold
// the designer then refines until the verdict reads OK.
// ───────────────────────────────────────────────────────────────
const J = n => Math.round((Math.random() * 2 - 1) * n);
const ln = (x1, y1, x2, y2, abs = false) => ({ kind: "line", x1, y1, x2, y2, abs });
const bx = (x1, y1, x2, y2, abs = false) => ({ kind: "box", x1, y1, x2, y2, abs });
const rg = (cx, cy, r, gapA, gapS, segs = 16, abs = false) => ({ kind: "ring", cx, cy, r, gapA, gapS, segs, abs });
const periscope = () => [ln(40, 160, 160, 160), ln(150, 222, 180, 192), ln(85, 200, 115, 230)];

const TEMPLATES = {
  0: [
    () => ({ tx: 100 + J(40), recipes: [] }),
    () => ({ tx: 100, recipes: [ln(35, 95, 94, 148), ln(165, 95, 106, 148)] }),
  ],
  1: [ // 1 bounce — roof bank, dome, box island
    () => ({ tx: 100 + J(20), recipes: [ln(40 + J(8), 80 + J(6), 160 + J(8), 80 + J(6))] }),
    () => ({ tx: 100, recipes: [rg(100, 188, 42 + J(5), -Math.PI * 0.82, Math.PI / 2.8, 16)] }),
    () => { const w = 60 + J(15), cx = 100 + J(10); return { tx: 100 + J(10), recipes: [bx(cx - w / 2, 100 + J(6), cx + w / 2, 150 + J(6))] }; },
  ],
  2: [ // 2 bounces — bumper+ledge, totem, chevron
    () => ({ tx: 130 + J(20), recipes: [ln(60 + J(8), 75, 60 + J(8), 165), ln(80, 165 + J(6), 199, 165 + J(6))] }),
    () => ({ tx: 100, recipes: [ln(100, 110, 100, 170), ln(40, 170, 160, 170), ln(1, 130, 40 + J(6), 130), ln(160 - J(6), 130, 199, 130)] }),
    () => { const apex = 120 + J(10); return { tx: 100, recipes: [ln(30, 165, 100, apex), ln(100, apex, 170, 165), ln(1, 135, 45, 135), ln(155, 135, 199, 135)] }; },
  ],
  3: [ // 3 bounces — periscope+pocket, staircase
    () => ({ tx: 100, recipes: [...periscope(), ln(70 + J(6), 170, 70 + J(6), 198), ln(130 - J(6), 170, 130 - J(6), 198)] }),
    () => ({ tx: 130 + J(20), recipes: [ln(1, 100 + J(6), 140, 100 + J(6)), ln(60, 158 + J(6), 199, 158 + J(6))] }),
  ],
  4: [ // 4 bounces — lava serpentine, lava bumper run
    () => ({ tx: 130, recipes: [ln(60, 55, 199, 55), ln(1, 90, 160, 90, true), ln(40, 130, 199, 130, true), ln(1, 170, 160, 170, true)] }),
    () => ({ tx: 130 + J(15), recipes: [ln(60, 75, 60, 165), ln(80, 165, 199, 165), ln(1, 90, 48 + J(6), 90, true), ln(78 + J(6), 90, 199, 90, true)] }),
  ],
  5: [ // 5+ bounces — pocket periscope + gate, razor gate + shields
    () => ({ tx: 100, recipes: [...periscope(), ln(76, 170, 76, 198), ln(124, 170, 124, 198), ln(1, 105, 140, 105), ln(178, 105, 199, 105)] }),
    () => ({ tx: 158, recipes: [ln(42, 158, 158, 158), ln(1, 110, 92, 110), ln(118, 110, 199, 110), { kind: "shields", y1: 170, y2: 225, abs: true }] }),
  ],
};
document.getElementById("suggestBtn").addEventListener("click", () => {
  pushUndo();
  const pool = TEMPLATES[bandMin(state.slot)] || TEMPLATES[1];
  const t = pool[Math.floor(Math.random() * pool.length)]();
  state.tx = Math.max(20, Math.min(180, Math.round(t.tx)));
  state.recipes = t.recipes.map(r => ({ ...r }));
  document.getElementById("targetX").value = state.tx;
  selected = -1;
  refresh();
});

function refresh(recomputeNow = true) {
  document.getElementById("bandTag").textContent = `band: ${bandMin(state.slot)}+ bounces`;
  document.getElementById("targetXVal").textContent = state.tx;
  drawBoard(); renderParams(); renderObsList(); renderExport();
  if (recomputeNow) computeSolution(); else scheduleSim();
  try { localStorage.setItem("ricochetEditor", JSON.stringify(state)); } catch (_) {}
}

// restore
try {
  const saved = localStorage.getItem("ricochetEditor");
  if (saved) state = JSON.parse(saved);
} catch (_) {}
document.getElementById("slotNum").value = state.slot;
document.getElementById("targetX").value = state.tx;
refresh();
</script>
</body>
