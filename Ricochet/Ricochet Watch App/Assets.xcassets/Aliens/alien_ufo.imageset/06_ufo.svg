  <path d="M 75 95 Q 78 70 95 65" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <!-- Little alien silhouette inside dome -->
  <ellipse cx="100" cy="90" rx="12" ry="14" fill="#7BC96F" stroke="#1a1a1a" stroke-width="4"/>
  <ellipse cx="100" cy="103" rx="8" ry="6" fill="#7BC96F" stroke="#1a1a1a" stroke-width="4"/>
  <ellipse cx="96" cy="88" rx="2" ry="3" fill="#1a1a1a"/>
  <ellipse cx="104" cy="88" rx="2" ry="3" fill="#1a1a1a"/>
</svg>
